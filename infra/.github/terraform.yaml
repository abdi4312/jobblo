name: pre-commit

on:
  pull_request:

jobs:
  pre-commit:
    name: '🔍 Pre-commit'
    runs-on: ubuntu-latest
    steps:
      - name: '🛎️ Checkout code'
        uses: actions/checkout@v4
      - name: '🐍 Setup Python'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: '🔍 Validate pre-commit'
        uses: pre-commit/action@v3.0.1
        with:
          extra_args: terraform_fmt
